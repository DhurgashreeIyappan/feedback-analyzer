name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Check Python Syntax
        run: |
          python -m py_compile process_feedback.py
          python -m py_compile enrich_feedback.py
          python -m py_compile generate_report.py
          python -m py_compile app.py

      - name: Run Data Cleaning Pipeline
        run: |
          python process_feedback.py

      - name: Verify Cleaned Output
        run: |
          if [ ! -f outputs/cleaned_feedback.csv ]; then
            echo "Error: outputs/cleaned_feedback.csv not found"
            exit 1
          fi
          echo "outputs/cleaned_feedback.csv exists"

      - name: Check Enriched Data
        id: check_enriched
        run: |
          if [ -f outputs/cleaned_enriched_feedback.csv ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "outputs/cleaned_enriched_feedback.csv exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "outputs/cleaned_enriched_feedback.csv not found (skipping report generation)"
          fi

      - name: Generate Report
        if: steps.check_enriched.outputs.exists == 'true'
        run: |
          python generate_report.py

      - name: Verify Report Output
        if: steps.check_enriched.outputs.exists == 'true'
        run: |
          if [ ! -f outputs/summary_report.md ]; then
            echo "Error: outputs/summary_report.md not found"
            exit 1
          fi
          echo "outputs/summary_report.md exists"

      - name: Upload Outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: outputs/
          retention-days: 7

      - name: CI Summary
        if: always()
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Python syntax check passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Data cleaning pipeline completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cleaned output verified" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_enriched.outputs.exists }}" == "true" ]; then
            echo "- ✅ Report generation completed" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Report output verified" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ Report generation skipped (enriched data not found)" >> $GITHUB_STEP_SUMMARY
          fi
